# Thesis layout: shared audio under ../../datasets/dcase2025/
--dataset_directory: ../../datasets/dcase2025
--result_directory: ../../results/CORAL_Res
--export_dir: CORAL_Res

# ToyRCCar eval (thesis default)
--dataset: DCASE2025T2ToyRCCar
-tag: "id(0_)"
--use_ids: 0

--use_cuda: True
--log_interval: 100
--model: DCASE2023T2-AE
--score: MSE
--seed: 13711
--is_auto_download: False
--mono: True

--max_fpr: 0.1
--decision_threshold: 0.9

# CORAL Residual Alignment Parameters
--use_coral_res: True
--coral_mode: source_to_target
--coral_eps: 1e-5
--mahala_reg_lambda: 1e-5

# feature
--n_mels: 128
--frames: 5
--frame_hop_length: 1
--n_fft: 1024
--hop_length: 512
--power: 2.0
--fmin: 0.0
--fmax: null
--win_length: null

# fit
--batch_size: 256
--epochs: 100
-lr: 0.001
--shuffle: True
--validation_split: 0.1
